name: Security Scan

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  trivy-api:
    name: Trivy scan — API image
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build API image for scanning
        id: build-api
        run: docker build -t habitflow-api:scan ./backend
        continue-on-error: true

      - name: Run Trivy on API image
        if: steps.build-api.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: habitflow-api:scan
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Check SARIF exists
        id: check-api-sarif
        run: |
          if [ -f trivy-api.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy API results to GitHub Security tab
        if: steps.check-api-sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

  trivy-web:
    name: Trivy scan — Web image
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Web image for scanning
        id: build-web
        run: docker build -t habitflow-web:scan ./frontend
        continue-on-error: true

      - name: Run Trivy on Web image
        if: steps.build-web.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: habitflow-web:scan
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Check SARIF exists
        id: check-web-sarif
        run: |
          if [ -f trivy-web.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy Web results to GitHub Security tab
        if: steps.check-web-sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

  pip-audit:
    name: pip-audit — Python dependencies
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        id: pip-audit
        run: |
          pip-audit -r backend/requirements.txt \
            --format sarif \
            --output pip-audit.sarif
        continue-on-error: true

      - name: Check SARIF exists
        id: check-pip-sarif
        run: |
          if [ -f pip-audit.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload pip-audit results to GitHub Security tab
        if: steps.check-pip-sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit
